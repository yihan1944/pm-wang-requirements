{% extends "base.html" %}
{% block title %}新建项目{% endblock %}
{% block content %}
<div class="page-header">
    <h1>新建分析项目</h1>
</div>
<form method="post" action="/projects/new" class="form-card">
    <div class="form-group">
        <label for="name">项目名称 *</label>
        <input type="text" id="name" name="name" required placeholder="例：西窗读诗">
    </div>
    <div class="form-group">
        <label for="description">项目描述</label>
        <textarea id="description" name="description" rows="3" placeholder="简要描述产品和分析目标"></textarea>
    </div>
    <div class="form-actions">
        <button type="submit" class="btn btn-primary">创建项目</button>
        <a href="/" class="btn btn-ghost">取消</a>
    </div>
</form>
{% endblock %}
